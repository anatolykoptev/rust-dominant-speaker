# Release workflow using crates.io Trusted Publishing (OIDC).
#
# To release:
#   1. Bump version in Cargo.toml + update CHANGELOG.md + commit.
#   2. Tag:  git tag -a vX.Y.Z -m "Release vX.Y.Z"
#   3. Push: git push origin main && git push origin vX.Y.Z
#   This workflow runs on tag push and publishes to crates.io.
#
# Or use cargo-release (https://crates.io/crates/cargo-release):
#   cargo release patch --execute
#
# One-time setup (done on crates.io web UI):
#   https://crates.io/crates/rust-dominant-speaker/settings
#   Trusted Publishers -> Add GitHub publisher:
#     - Repository owner: anatolykoptev
#     - Repository name:  rust-dominant-speaker
#     - Workflow file:    publish.yml
#     - Environment:      (leave blank)

name: Publish to crates.io

on:
  push:
    tags: ['v*']

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify Cargo.toml version matches tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${REF_NAME#v}"
          CARGO_VERSION=$(grep -m1 -E '^version = ' Cargo.toml | cut -d'"' -f2)
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch - Cargo.toml=$CARGO_VERSION, tag=$TAG_VERSION"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish
